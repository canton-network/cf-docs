name: Sync Daml Prim API from dpm

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/sync-daml-prim-api.yml"
      - "scripts/**"
      - "shell.nix"
      - "README.md"
      - "docs.json"
  workflow_dispatch:
    inputs:
      versions:
        description: "Comma-separated SDK versions. Leave empty to use latest_n."
        required: false
        default: ""
      latest_n:
        description: "How many latest stable SDK versions to sync when versions is empty."
        required: false
        default: "3"
      lf_target:
        description: "LF target (for example 2.2). Leave empty to auto-detect."
        required: false
        default: ""
      dry_run:
        description: "Dry run only (no PR creation)"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-daml-prim-api
  cancel-in-progress: false

jobs:
  sync-daml-prim-api:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NIX_PATH: nixpkgs=channel:nixos-24.11
      SKIP_NPM_INSTALL: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Resolve Parameters
        id: params
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            versions="${{ inputs.versions }}"
            latest_n="${{ inputs.latest_n }}"
            lf_target="${{ inputs.lf_target }}"
            dry_run="${{ inputs.dry_run }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            versions=""
            latest_n="3"
            lf_target=""
            dry_run="true"
          else
            versions=""
            latest_n="3"
            lf_target=""
            dry_run="true"
          fi
          if [[ -n "$versions" ]]; then
            version_label="$versions"
          else
            version_label="latest-$latest_n"
          fi
          echo "versions=$versions" >> "$GITHUB_OUTPUT"
          echo "latest_n=$latest_n" >> "$GITHUB_OUTPUT"
          echo "version_label=$version_label" >> "$GITHUB_OUTPUT"
          echo "lf_target=$lf_target" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"

      - name: Run Unit Tests
        shell: bash
        run: |
          nix-shell --run 'python3 -m unittest -v scripts.tests.test_daml_docs_json_to_mdx'

      - name: Show Tool Versions
        shell: bash
        run: |
          nix-shell --run 'python3 --version && dpm --version && dpm version -o json'

      - name: Generate and Convert Daml Prim Docs
        shell: bash
        run: |
          cmd="./scripts/sync_daml_prim_api_from_dpm.sh --latest-n '${{ steps.params.outputs.latest_n }}'"
          if [[ -n "${{ steps.params.outputs.versions }}" ]]; then
            cmd="$cmd --versions '${{ steps.params.outputs.versions }}'"
          fi
          if [[ -n "${{ steps.params.outputs.lf_target }}" ]]; then
            cmd="$cmd --lf-target '${{ steps.params.outputs.lf_target }}'"
          fi
          nix-shell --run "$cmd"

      - name: Show Diff
        shell: bash
        run: |
          git status --short
          git diff --stat

      - name: Detect Changes
        id: changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Draft PR
        if: steps.params.outputs.dry_run == 'false' && steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Automatic update (daml-prim-api): ${{ steps.params.outputs.version_label }}"
          title: "Automatic update (daml-prim-api): ${{ steps.params.outputs.version_label }}"
          body: |
            Automated update of Daml Prim API docs generated from dpm artifacts.

            - SDK versions: `${{ steps.params.outputs.versions || format('latest {0}', steps.params.outputs.latest_n) }}`
            - LF target: `${{ steps.params.outputs.lf_target || 'auto' }}`
            - Trigger: `${{ github.event_name }}`
          branch: "automation/daml-prim-api-${{ github.run_id }}"
          base: "main"
          draft: true
          add-paths: |
            docs-main/daml-reference/daml-prim-api
            docs.json

      - name: Dry Run Summary
        if: steps.params.outputs.dry_run == 'true'
        shell: bash
        run: |
          echo "Dry run completed. No PR was created."
